
name: Build APK
on:
  push:
    branches: [ main ]
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install dependencies
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android
          npx cap add android
          npx cap copy

      - name: Update Gradle version
        run: |
          cd android
          chmod +x gradlew
          ./gradlew wrapper --gradle-version=8.9 --distribution-type=all

      - name: Clean Gradle jars cache
        run: |
          rm -rf ~/.gradle/caches/jars-9
          rm -rf ~/.gradle/caches/transforms-*

      - name: Compile APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon --no-build-cache
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=512m"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: memoria-visual-tv
          path: android/app/build/outputs/apk/debug/app-debug.apk
